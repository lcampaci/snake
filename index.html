<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  

<title>Xadrez PRO</title>

<link rel="stylesheet" href="style.css">

<!-- Chessboard -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://cdn.jsdelivr.net/npm/stockfish/stockfish.js"></script>
</head>

<body>

<header>
  <h2>♟ Xadrez PRO</h2>
  <div id="status">Sua vez</div>
</header>

<div id="board"></div>

<nav class="menu">
  <button onclick="newGame()">Novo</button>
  <button onclick="toggleTheme()">Tema</button>
  <button onclick="setLevel(5)">Fácil</button>
  <button onclick="setLevel(10)">Médio</button>
  <button onclick="setLevel(18)">Difícil</button>
</nav>

<!-- libs -->
<script src="https://cdn.jsdelivr.net/npm/chess.js@0.13.4/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script src="app.js"></script>
</body>
</html>
