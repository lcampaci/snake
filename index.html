<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Snake PRO+</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #0f0;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
}

canvas {
  background: black;
  border: 3px solid #0f0;
  margin-top: 10px;
}

#hud {
  margin-top: 10px;
}

#gameOver {
  position: absolute;
  top: 40%;
  text-align: center;
  display: none;
}

.controls {
  margin-top: 15px;
}

button {
  font-size: 20px;
  margin: 5px;
}
</style>
</head>

<body>

<h1>🐍 Snake PRO+</h1>

<div id="hud">
  Score: <span id="score">0</span> |
  Recorde: <span id="highscore">0</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="gameOver">
  <h2>💀 Game Over</h2>
  <p>Pressione ENTER ou toque para reiniciar</p>
</div>

<div id="pauseMsg" style="display:none; position:absolute; top:45%;">
  <h2>⏸️ PAUSADO</h2>
</div>

<!-- Controles mobile -->
<div class="controls">
  <div>
    <button onclick="setDirection('up')">⬆️</button>
  </div>
  <div>
    <button onclick="setDirection('left')">⬅️</button>
    <button onclick="setDirection('down')">⬇️</button>
    <button onclick="setDirection('right')">➡️</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const highEl = document.getElementById("highscore");
const gameOverEl = document.getElementById("gameOver");

const pauseMsg = document.getElementById("pauseMsg");

const grid = 20;

let snake, apple;
let count, speed, score, gameRunning, paused;

// 🔊 som simples
function beep() {
  const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctxAudio.createOscillator();
  osc.connect(ctxAudio.destination);
  osc.start();
  osc.stop(ctxAudio.currentTime + 0.1);
}

// 🏆 recorde
let highscore = localStorage.getItem("snakeHigh") || 0;
highEl.textContent = highscore;

function resetGame() {
  snake = {
    x: 160,
    y: 160,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
  };

  apple = {
    x: 320,
    y: 320
  };

  count = 0;
  speed = 6;
  score = 0;
  gameRunning = true;
  paused = false;

  scoreEl.textContent = 0;
  gameOverEl.style.display = "none";
}



function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

function loop() {
  requestAnimationFrame(loop);

  if (!gameRunning || paused) return;

  if (++count < speed) return;
  count = 0;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  snake.x += snake.dx;
  snake.y += snake.dy;

  // parede
  if (
    snake.x < 0 || snake.x >= canvas.width ||
    snake.y < 0 || snake.y >= canvas.height
  ) {
    gameOver();
  }

  snake.cells.unshift({x: snake.x, y: snake.y});
  if (snake.cells.length > snake.maxCells) {
    snake.cells.pop();
  }

  // maçã
  ctx.fillStyle = "red";
  ctx.fillRect(apple.x, apple.y, grid - 1, grid - 1);

  // cobra
  ctx.fillStyle = "#0f0";
  snake.cells.forEach((cell, index) => {
    ctx.fillRect(cell.x, cell.y, grid - 1, grid - 1);

    // comer
    if (cell.x === apple.x && cell.y === apple.y) {
      snake.maxCells++;
      score++;
      scoreEl.textContent = score;

      beep();

      // aumenta velocidade
      //if (speed > 2) speed--;
	  
	  // aumenta velocidade devagar
	  speed = Math.max(3, 6 - Math.floor(score / 5));

      apple.x = getRandomInt(0, 20) * grid;
      apple.y = getRandomInt(0, 20) * grid;
    }

    // colisão corpo
    for (let i = index + 1; i < snake.cells.length; i++) {
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        gameOver();
      }
    }
  });
}

function gameOver() {
  gameRunning = false;

  // salva recorde
  if (score > highscore) {
    highscore = score;
    localStorage.setItem("snakeHigh", highscore);
    highEl.textContent = highscore;
  }

  gameOverEl.style.display = "block";
}

// teclado
document.addEventListener("keydown", (e) => {

  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    e.preventDefault();
  }
  
  // ⏸️ PAUSE COM ESPAÇO
  if (e.code === "Space") {
    e.preventDefault();
    paused = !paused;
    pauseMsg.style.display = paused ? "block" : "none";
  }

  if (!gameRunning && e.key === "Enter") {
    resetGame();
    return;
  }

  handleDirection(e.key);
});

// mobile
function setDirection(dir) {
  if (!gameRunning) {
    resetGame();
    return;
  }

  const map = {
    up: "ArrowUp",
    down: "ArrowDown",
    left: "ArrowLeft",
    right: "ArrowRight"
  };

  handleDirection(map[dir]);
}

function handleDirection(key) {
  if (key === "ArrowLeft" && snake.dx === 0) {
    snake.dx = -grid; snake.dy = 0;
  } else if (key === "ArrowUp" && snake.dy === 0) {
    snake.dy = -grid; snake.dx = 0;
  } else if (key === "ArrowRight" && snake.dx === 0) {
    snake.dx = grid; snake.dy = 0;
  } else if (key === "ArrowDown" && snake.dy === 0) {
    snake.dy = grid; snake.dx = 0;
  }
}

resetGame();
requestAnimationFrame(loop);
</script>

</body>
</html>
