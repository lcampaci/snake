<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake PRO+ v96</title>
<style>
html, body{
    height:100%;
    margin:0;
    overflow:hidden;
}

body{
    background:#008080;
    font-family:Tahoma,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* JANELA */

.window{
    background:#C0C0C0;

    border-top:2px solid #fff;
    border-left:2px solid #fff;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;

    box-shadow:2px 2px 0 #000;

    padding:3px;
    max-width:95vw;
}

/* BARRA DE TÍTULO */

.titlebar{
    background:linear-gradient(to right,#000080,#1084d0);
    color:white;

    padding:4px 8px;

    font-size:14px;
    font-weight:bold;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title-buttons{
    display:flex;
    gap:2px;
}

.title-buttons div{
    width:16px;
    height:14px;

    background:#C0C0C0;

    border-top:1px solid #fff;
    border-left:1px solid #fff;
    border-right:1px solid #404040;
    border-bottom:1px solid #404040;
}

.content{
    padding:10px;
}

#hud{
    margin-bottom:8px;
    color:black;
    font-weight:bold;
}

canvas{
    background:black;
    border:2px inset #808080;

    max-width:90vw;
    max-height:70vh;

    touch-action:none;
}

/* STATUS */

.statusbar{
    margin-top:5px;
    padding:3px;

    border:1px inset #808080;
    font-size:12px;
}

/* MENSAGENS */

#startMsg,
#pauseMsg,
#gameOver{
    text-align:center;
    margin-top:8px;
    font-weight:bold;
}

#pauseMsg{
    display:none;
    color:#800000;
}

#gameOver{
    display:none;
    color:#800000;
}

/* CONTROLES MOBILE */

.controls{
    position:fixed;
    bottom:10px;
    left:0;
    width:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
}

button{

    width:55px;
    height:55px;

    font-size:18px;

    background:#C0C0C0;

    border-top:2px solid white;
    border-left:2px solid white;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;

    margin:2px;
}

button:active{
    border-top:2px solid #404040;
    border-left:2px solid #404040;
    border-right:2px solid white;
    border-bottom:2px solid white;
}

</style>
</head>

<body>

<div class="window">

    <div class="titlebar">
        <span>🐍 Snake PRO+ v96</span>

        <div class="title-buttons">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <div class="content">

        <div id="hud">
            Score: <span id="score">0</span> |
            Recorde: <span id="highscore">0</span>
        </div>

        <canvas id="game" width="400" height="400"></canvas>

        <div id="startMsg">
            Pressione uma seta para começar
        </div>

        <div id="pauseMsg">
            ⏸ PAUSADO
        </div>

        <div id="gameOver">
            💀 GAME OVER - ENTER para reiniciar
        </div>

        <div class="statusbar">
            Pronto | Espaço = Pause | Enter = Reiniciar
        </div>

    </div>

</div>

<div class="controls">
    <div>
        <button onclick="setDirection('up')">⬆️</button>
    </div>

    <div>
        <button onclick="setDirection('left')">⬅️</button>
        <button onclick="setDirection('down')">⬇️</button>
        <button onclick="setDirection('right')">➡️</button>
    </div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const highEl = document.getElementById("highscore");

const gameOverEl = document.getElementById("gameOver");
const pauseMsg = document.getElementById("pauseMsg");
const startMsg = document.getElementById("startMsg");

const grid = 20;

let snake;
let apple;

let count;
let speed;
let score;

let gameRunning;
let paused;
let started = false;

/* SOM */

function beep(){

    const audioCtx =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const osc = audioCtx.createOscillator();

    osc.frequency.value = 600;

    osc.connect(audioCtx.destination);

    osc.start();

    osc.stop(audioCtx.currentTime + 0.08);
}

/* RECORDE */

let highscore =
    localStorage.getItem("snakeHigh") || 0;

highEl.textContent = highscore;

/* RESET */

function resetGame(){

    snake = {
        x:160,
        y:160,

        dx:0,
        dy:0,

        cells:[{
            x:160,
            y:160
        }],

        maxCells:4
    };

    apple = {
        x:320,
        y:320
    };

    count = 0;
    speed = 6;

    score = 0;

    gameRunning = true;
    paused = false;
    started = false;

    scoreEl.textContent = 0;

    gameOverEl.style.display = "none";
    pauseMsg.style.display = "none";
    startMsg.style.display = "block";
}

/* RANDOM */

function getRandomInt(min,max){
    return Math.floor(
        Math.random() * (max-min)
    ) + min;
}

/* GAME OVER */

function gameOver(){

    gameRunning = false;

    if(score > highscore){

        highscore = score;

        localStorage.setItem(
            "snakeHigh",
            highscore
        );

        highEl.textContent =
            highscore;
    }

    gameOverEl.style.display =
        "block";
}

/* LOOP */

function loop(){

    requestAnimationFrame(loop);

    if(!started){

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        ctx.fillStyle = "red";
        ctx.fillRect(
            apple.x,
            apple.y,
            grid-1,
            grid-1
        );

        ctx.fillStyle = "#00ff00";
        ctx.fillRect(
            snake.x,
            snake.y,
            grid-1,
            grid-1
        );

        return;
    }

    if(!gameRunning || paused)
        return;

    if(++count < speed)
        return;

    count = 0;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    snake.x += snake.dx;
    snake.y += snake.dy;

    if(
    snake.x < 0 ||
    snake.y < 0 ||
    snake.x >= canvas.width ||
    snake.y >= canvas.height
){
    gameOver();
    return;
}
    snake.cells.unshift({
        x:snake.x,
        y:snake.y
    });

    if(
        snake.cells.length >
        snake.maxCells
    ){
        snake.cells.pop();
    }

    /* maçã */

    ctx.fillStyle = "red";

    ctx.fillRect(
        apple.x,
        apple.y,
        grid-1,
        grid-1
    );

    /* cobra */

    ctx.fillStyle = "#00ff00";

    snake.cells.forEach((cell,index)=>{

        ctx.fillRect(
            cell.x,
            cell.y,
            grid-1,
            grid-1
        );

        if(
            cell.x === apple.x &&
            cell.y === apple.y
        ){

            snake.maxCells++;

            score++;

            scoreEl.textContent =
                score;

            beep();

            speed = Math.max(
                3,
                6 - Math.floor(score/5)
            );

           do {
    apple.x = getRandomInt(0,20) * grid;
    apple.y = getRandomInt(0,20) * grid;
} while (
    snake.cells.some(
        c => c.x === apple.x && c.y === apple.y
    )
);
        }

        for(
            let i=index+1;
            i<snake.cells.length;
            i++
        ){

            if(
                cell.x ===
                snake.cells[i].x &&
                cell.y ===
                snake.cells[i].y
            ){
                gameOver();
            }
        }
    });
}

/* TECLADO */

document.addEventListener(
    "keydown",
    e=>{

        if(
            [
                "ArrowUp",
                "ArrowDown",
                "ArrowLeft",
                "ArrowRight"
            ].includes(e.key)
        ){
            e.preventDefault();
        }

       if(e.code==="Space" && started){
    paused = !paused;
}

            pauseMsg.style.display =
                paused
                ? "block"
                : "none";
        }

        if(
            !gameRunning &&
            e.key==="Enter"
        ){
            resetGame();
            return;
        }

        handleDirection(e.key);
    }
);

/* MOBILE */

function setDirection(dir){

    const map = {

        up:"ArrowUp",
        down:"ArrowDown",
        left:"ArrowLeft",
        right:"ArrowRight"
    };

    handleDirection(map[dir]);
}

/* DIREÇÃO */

function handleDirection(key){

    started = true;

    startMsg.style.display =
        "none";

    if(
        key==="ArrowLeft" &&
        snake.dx!==grid
    ){
        snake.dx = -grid;
        snake.dy = 0;
    }

    else if(
        key==="ArrowRight" &&
        snake.dx!==-grid
    ){
        snake.dx = grid;
        snake.dy = 0;
    }

    else if(
        key==="ArrowUp" &&
        snake.dy!==grid
    ){
        snake.dx = 0;
        snake.dy = -grid;
    }

    else if(
        key==="ArrowDown" &&
        snake.dy!==-grid
    ){
        snake.dx = 0;
        snake.dy = grid;
    }
}

resetGame();
requestAnimationFrame(loop);

</script>
</body>
</html>
